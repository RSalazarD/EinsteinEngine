name: Publicar en PyPI (CD)

# 1. EL DISPARADOR: Solo al crear una etiqueta (tag) de versión
on:
  push:
    tags:
      - 'v*' # Se activa con v0.1.1, v0.2.0, v1.0.0, etc.

# 2. EL SERVIDOR Y LOS PERMISOS
jobs:
  pypi-publish:
    name: Subir a PyPI
    runs-on: ubuntu-latest
    
    # ESTO ES LA MAGIA: Le da permiso al robot para usar Trusted Publishing
    permissions:
      id-token: write
      contents: read
    
    # 3. LA RECETA
    steps:
    - name: 📥 Descargar el código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Construir la librería (Crear la carpeta dist/)
      run: |
        python -m pip install build
        python -m build

    - name: 🚀 Publicar en PyPI automáticamente
      uses: pypa/gh-action-pypi-publish@release/v1